services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PYTHON_VERSION: "3.13"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGIN: http://localhost:3000
      AGENT1_USE_LLM: "true"
      OLLAMA_MODEL: gemma3:4b
      OLLAMA_BASE_URL: http://ollama:11434
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: culinary
      DB_PASSWORD: culinary
      DB_NAME: ricettario
      DB_DEFAULT_CATEGORY: Importazione PDF
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/workspace/data
      - ./backend/db:/workspace/db
    depends_on:
      mariadb:
        condition: service_healthy
      ollama:
        condition: service_started

  mariadb:
    image: mariadb:11.7
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ricettario
      MARIADB_USER: culinary
      MARIADB_PASSWORD: culinary
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backend/db/schema/create.sql:/docker-entrypoint-initdb.d/001-create.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  mariadb_data:
  ollama_data:
  frontend_node_modules:
